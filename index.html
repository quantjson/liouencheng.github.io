<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人網站 - liouencheng</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="logo">Liouencheng</div>
                <ul class="nav-menu">
                    <li><a href="#home">首頁</a></li>
                    <li><a href="#about">關於</a></li>
                    <li><a href="#projects">作品</a></li>
                    <li><a href="#contact">聯絡</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <!-- Hero Section -->
        <section id="home" class="hero">
            <div class="container">
                <h1>歡迎來到我的網站</h1>
                <p>探索我的作品與想法</p>
                <a href="#projects" class="btn btn-primary">查看作品</a>
            </div>
        </section>

        <!-- About Section -->
        <section id="about" class="about">
            <div class="container">
                <h2>關於我</h2>
                <p>這是一個關於你自己的簡短介紹。你可以分享你的背景、技能和興趣。</p>
            </div>
        </section>

        <!-- Projects Section -->
        <section id="projects" class="projects">
            <div class="container">
                <h2>我的作品</h2>
                <div class="projects-grid">
                    <div class="project-card">
                        <h3>專案 1</h3>
                        <p>專案描述</p>
                        <a href="#" class="btn btn-secondary">了解更多</a>
                    </div>
                    <div class="project-card">
                        <h3>專案 2</h3>
                        <p>專案描述</p>
                        <a href="#" class="btn btn-secondary">了解更多</a>
                    </div>
                    <div class="project-card">
                        <h3>專案 3</h3>
                        <p>專案描述</p>
                        <a href="#" class="btn btn-secondary">了解更多</a>
                    </div>
                </div>
            </div>
        </section>

        <!-- Contact Section -->
        <section id="contact" class="contact">
            <div class="container">
                <h2>聯絡我</h2>
                <p>歡迎通過以下方式與我聯絡</p>
                <div class="contact-links">
                    <a href="mailto:your.email@example.com" class="btn btn-primary">發送郵件</a>
                    <a href="https://github.com/quantjson" class="btn btn-secondary">GitHub</a>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Liouencheng. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
